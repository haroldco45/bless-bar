<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bless Bar">
<meta property="og:title" content="Bless Bar — Granizados con o sin Licor">
<meta property="og:description" content="Los mejores granizados de Buga, Valle. Mora, Baileys, Coco Loco 🧊">
<meta property="og:image" content="icons/icon-512.png">
<meta property="og:url" content="https://blessbar.netlify.app">
<meta name="twitter:card" content="summary_large_image">
<title>Bless Bar 🧊</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --neon-pink: #ff2d78;
    --neon-green: #00ff88;
    --neon-yellow: #ffe600;
    --neon-cyan: #00e5ff;
    --dark: #060610;
    --card-bg: rgba(255,255,255,0.04);
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow-x: hidden;
    color: white;
  }

  /* ===== SPLASH SCREEN ===== */
  #splash {
    position: fixed; inset: 0; z-index: 1000;
    background: #060610;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    transition: opacity 0.6s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  .splash-logo {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan));
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    box-shadow: 0 0 40px rgba(255,45,120,0.6);
    animation: pulse-logo 1.5s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%, 100% { box-shadow: 0 0 40px rgba(255,45,120,0.6); transform: scale(1); }
    50% { box-shadow: 0 0 70px rgba(0,229,255,0.8); transform: scale(1.05); }
  }
  .splash-name {
    font-size: 36px; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .splash-tagline { color: rgba(255,255,255,0.5); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; }
  .splash-bar {
    width: 160px; height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden; margin-top: 8px;
  }
  .splash-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
    border-radius: 2px;
    animation: load-bar 1.8s ease forwards;
  }
  @keyframes load-bar { from { width: 0; } to { width: 100%; } }

  /* ===== HEADER ===== */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(6,6,16,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,45,120,0.2);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 15px rgba(255,45,120,0.4);
  }
  .header-text h1 { font-size: 18px; font-weight: 800; letter-spacing: 1px; }
  .header-text p { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }
  .header-status {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 20px; padding: 4px 10px;
  }
  .status-dot { width: 7px; height: 7px; background: var(--neon-green); border-radius: 50%; animation: blink 1.5s ease infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-text { font-size: 10px; color: var(--neon-green); font-weight: 700; letter-spacing: 1px; }

  /* ===== HERO POSTER ===== */
  .hero {
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .hero img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
  }
  .hero-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, var(--dark), transparent);
  }

  /* ===== SECCIÓN TÍTULO ===== */
  .section-title {
    text-align: center;
    padding: 28px 20px 16px;
  }
  .section-title h2 {
    font-size: 22px; font-weight: 900; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .section-title h2 span {
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-yellow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .section-title p { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 4px; letter-spacing: 2px; }

  /* ===== TOGGLE CON/SIN LICOR ===== */
  .toggle-section {
    display: flex; justify-content: center;
    padding: 0 20px 20px;
    gap: 0;
  }
  .toggle-btn {
    flex: 1; max-width: 140px;
    padding: 10px 16px;
    border: none; cursor: pointer;
    font-size: 13px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.3s ease;
  }
  .toggle-btn:first-child { border-radius: 12px 0 0 12px; }
  .toggle-btn:last-child { border-radius: 0 12px 12px 0; }
  .toggle-btn.con {
    background: rgba(0,255,136,0.1);
    color: rgba(0,255,136,0.5);
    border: 1px solid rgba(0,255,136,0.2);
  }
  .toggle-btn.con.active {
    background: linear-gradient(135deg, #00b359, #00ff88);
    color: #000;
    border-color: transparent;
    box-shadow: 0 0 20px rgba(0,255,136,0.4);
  }
  .toggle-btn.sin {
    background: rgba(255,45,120,0.1);
    color: rgba(255,45,120,0.5);
    border: 1px solid rgba(255,45,120,0.2);
  }
  .toggle-btn.sin.active {
    background: linear-gradient(135deg, #cc0055, #ff2d78);
    color: white;
    border-color: transparent;
    box-shadow: 0 0 20px rgba(255,45,120,0.4);
  }

  /* ===== CARDS DE PRODUCTOS ===== */
  .products {
    padding: 0 16px 20px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .product-card {
    background: var(--card-bg);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.07);
    overflow: hidden;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: card-in 0.5s ease both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .product-card:active { transform: scale(0.98); }
  .card-accent {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card-mora .card-accent { background: linear-gradient(90deg, #8B1A8B, #ff00ff); }
  .card-baileys .card-accent { background: linear-gradient(90deg, #8B4513, #D4A017); }
  .card-coco .card-accent { background: linear-gradient(90deg, #006994, #00e5ff); }

  .card-body { padding: 16px; display: flex; align-items: center; gap: 14px; }
  .card-emoji { font-size: 42px; flex-shrink: 0; }
  .card-info { flex: 1; }
  .card-name {
    font-size: 20px; font-weight: 900; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .card-mora .card-name { color: #e066ff; }
  .card-baileys .card-name { color: #D4A017; }
  .card-coco .card-name { color: #00e5ff; }
  .card-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; text-transform: uppercase; letter-spacing: 1.5px; }
  .card-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tag {
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .tag-licor { background: rgba(0,255,136,0.15); color: var(--neon-green); border: 1px solid rgba(0,255,136,0.3); }
  .tag-sin { background: rgba(255,45,120,0.15); color: var(--neon-pink); border: 1px solid rgba(255,45,120,0.3); }
  .tag-popular { background: rgba(255,230,0,0.15); color: var(--neon-yellow); border: 1px solid rgba(255,230,0,0.3); }

  .card-price-section { text-align: right; flex-shrink: 0; }
  .card-price { font-size: 22px; font-weight: 900; }
  .card-mora .card-price { color: #e066ff; }
  .card-baileys .card-price { color: #D4A017; }
  .card-coco .card-price { color: #00e5ff; }
  .price-label { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }

  .card-footer {
    padding: 0 16px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-detail { font-size: 12px; color: rgba(255,255,255,0.3); }
  .btn-pedir {
    padding: 8px 18px;
    border: none; cursor: pointer;
    border-radius: 10px;
    font-size: 12px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  .card-mora .btn-pedir { background: linear-gradient(135deg, #8B1A8B, #cc00cc); color: white; }
  .card-baileys .btn-pedir { background: linear-gradient(135deg, #8B4513, #D4A017); color: white; }
  .card-coco .btn-pedir { background: linear-gradient(135deg, #006994, #00b8d4); color: white; }
  .btn-pedir:active { transform: scale(0.95); }

  /* ===== CARRITO FLOTANTE ===== */
  .cart-fab {
    position: fixed; bottom: 90px; right: 20px; z-index: 200;
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--neon-pink), #cc0055);
    border-radius: 50%; border: none; cursor: pointer;
    font-size: 26px;
    box-shadow: 0 4px 20px rgba(255,45,120,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s ease;
  }
  .cart-fab:active { transform: scale(0.92); }
  .cart-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--neon-yellow); color: #000;
    font-size: 11px; font-weight: 900;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .cart-badge.show { display: flex; }

  /* ===== DRAWER CARRITO ===== */
  .drawer-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
    background: #0e0e1e;
    border-radius: 24px 24px 0 0;
    border-top: 1px solid rgba(255,45,120,0.3);
    padding: 0 0 env(safe-area-inset-bottom);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    overflow-y: auto;
  }
  .drawer.open { transform: translateY(0); }
  .drawer-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .drawer-header {
    padding: 12px 20px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .drawer-title { font-size: 18px; font-weight: 800; }
  .drawer-close {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.08);
    border: none; border-radius: 50%; cursor: pointer;
    color: white; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .drawer-items { padding: 12px 20px; display: flex; flex-direction: column; gap: 10px; }
  .drawer-empty {
    text-align: center; padding: 32px 20px;
    color: rgba(255,255,255,0.3); font-size: 13px;
  }
  .drawer-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px; padding: 10px 12px;
  }
  .drawer-item-emoji { font-size: 28px; }
  .drawer-item-name { flex: 1; font-size: 14px; font-weight: 700; }
  .drawer-item-type { font-size: 10px; color: rgba(255,255,255,0.4); }
  .qty-controls { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.1);
    border: none; border-radius: 8px; cursor: pointer;
    color: white; font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-btn:active { transform: scale(0.9); }
  .qty-num { font-size: 15px; font-weight: 700; min-width: 20px; text-align: center; }

  .drawer-footer { padding: 16px 20px 24px; border-top: 1px solid rgba(255,255,255,0.06); }
  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .total-label { font-size: 14px; color: rgba(255,255,255,0.5); }
  .total-value { font-size: 22px; font-weight: 900; color: var(--neon-yellow); }
  .btn-whatsapp {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #128C7E, #25D366);
    border: none; border-radius: 14px; cursor: pointer;
    color: white; font-size: 16px; font-weight: 800;
    letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px rgba(37,211,102,0.3);
  }
  .btn-whatsapp:active { transform: scale(0.97); }

  /* ===== HORARIO ===== */
  .info-section {
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .info-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .info-icon { font-size: 22px; }
  .info-text h4 { font-size: 13px; font-weight: 700; }
  .info-text p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* ===== NAV BOTTOM ===== */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(6,6,16,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; padding: 10px 4px 8px;
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: rgba(255,255,255,0.3);
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    transition: color 0.2s ease;
  }
  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--neon-pink); }

  /* ===== PÁGINA INFO ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== SUCCESS SCREEN ===== */
  #success-screen {
    position: fixed; inset: 0; z-index: 500;
    background: #060610;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; text-align: center; padding: 32px;
    transform: scale(0); opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #success-screen.show { transform: scale(1); opacity: 1; }
  .success-icon { font-size: 72px; animation: bounce-in 0.6s 0.2s both; }
  @keyframes bounce-in { from { transform: scale(0); } to { transform: scale(1); } }
  .success-title { font-size: 26px; font-weight: 900; color: var(--neon-green); }
  .success-sub { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.5; }
  .btn-volver {
    margin-top: 8px; padding: 14px 32px;
    background: linear-gradient(135deg, var(--neon-pink), #cc0055);
    border: none; border-radius: 14px; cursor: pointer;
    color: white; font-size: 15px; font-weight: 800;
  }

  /* ===== FOOTER ===== */
  footer {
    padding: 20px 16px 90px;
    text-align: center;
    color: rgba(255,255,255,0.15);
    font-size: 10px; letter-spacing: 1px;
  }

  /* ===== INSTALL BANNER ===== */
  #install-banner {
    position: fixed; top: 70px; left: 16px; right: 16px; z-index: 150;
    background: linear-gradient(135deg, rgba(255,45,120,0.9), rgba(0,229,255,0.9));
    backdrop-filter: blur(10px);
    border-radius: 14px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    transform: translateY(-120%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 30px rgba(255,45,120,0.3);
    display: none;
  }
  #install-banner.show { transform: translateY(0); display: flex; }
  .install-text { flex: 1; }
  .install-text strong { font-size: 13px; font-weight: 800; color: #000; display: block; }
  .install-text span { font-size: 11px; color: rgba(0,0,0,0.6); }
  .btn-install {
    padding: 8px 14px; border: none; border-radius: 8px;
    background: #000; color: white; font-size: 12px; font-weight: 800;
    cursor: pointer; white-space: nowrap;
  }
  .btn-install-close {
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: rgba(0,0,0,0.5); padding: 4px;
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">🧊</div>
  <div class="splash-name">BLESS BAR</div>
  <div class="splash-tagline">Granizados con o sin licor</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <div style="font-size:24px">📲</div>
  <div class="install-text">
    <strong>Instalar app</strong>
    <span>Accede directo desde tu pantalla</span>
  </div>
  <button class="btn-install" onclick="installPWA()">Instalar</button>
  <button class="btn-install-close" onclick="closeInstallBanner()">✕</button>
</div>

<!-- HEADER -->
<header>
  <div class="header-brand">
    <div class="header-logo">🧊</div>
    <div class="header-text">
      <h1>BLESS BAR</h1>
      <p>Carrera 9 # 22-50</p>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span class="status-text">24H</span>
  </div>
</header>

<!-- CONTENT WRAPPER -->
<main>

  <!-- PÁGINA: MENÚ -->
  <div class="page active" id="page-menu">
